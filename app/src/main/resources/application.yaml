spring:
  application:
    name: "Project Template"

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:15432/template
    username: myuser
    password: secret
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:jwt/public-key.pem

aws:
  apigateway:
    # AWS API Gateway VPCリンクのID（例：vqxxxx）
    vpc-link-id: "vqxxxx"
    # ALBの内部DNSドメイン（http:// または https:// を含め、末尾の / は含めない）
    alb-uri: "http://internal-my-app-alb-123456789.ap-northeast-1.elb.amazonaws.com"

mybatis:
  type-aliases-package: cn.gekal.spring.template.domain.model
  type-handlers-package: cn.gekal.spring.template.infrastructure.config
  mapper-locations: classpath:mybatis/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
  show-actuator: true
